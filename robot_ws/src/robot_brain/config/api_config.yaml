# 火山引擎 / 豆包 API 配置
doubao:
  api_key: "${VOLCENGINE_API_KEY}"   # 从环境变量读取, 或直接填写
  model: "doubao-1.5-vision-pro-32k"   # 推理模型 (或自定义 endpoint ID)
  endpoint: "https://ark.cn-beijing.volces.com/api/v3"
  max_tokens: 1024
  temperature: 0.7

# 语音识别 (火山引擎 ASR)
asr:
  app_id: "YOUR_APP_ID"
  token: "YOUR_TOKEN"
  cluster: "volcengine_input_common"

# 语音合成 (火山引擎 TTS)
tts:
  app_id: "YOUR_APP_ID"
  token: "YOUR_TOKEN"
  cluster: "volcengine_tts"

# 摄像头
camera:
  device_id: 0
  width: 640
  height: 480

# 云端数据上传 (火山引擎 DataArk / 通用 HTTP)
cloud_upload:
  enabled: false
  endpoint: ""                           # 数据上传端点 URL
  dataset_id: "orchard-apple-quality"
  upload_interval_sec: 60                # 上报间隔 (秒), 0=实时每行上报
  retry_count: 3
  offline_cache_dir: "/tmp/orchard_cache"

# 串口 (机械臂)
serial:
  port: "/dev/ttyACM0"
  baudrate: 115200
